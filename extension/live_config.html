<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boss Battle — Streamer Controls</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    html, body {
      background: #0a0a0f;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <div class="config-container" style="max-width:700px;">

    <!-- Game status bar -->
    <div class="config-card" id="status-card">
      <h2>Streamer Battle Controls</h2>
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
        <span class="turn-number" id="lc-turn">Turn 0</span>
        <span class="label" id="lc-phase">No game active</span>
        <span class="label" id="lc-hp-summary">Boss: --/-- | Streamer: --/--</span>
      </div>
    </div>

    <!-- Start game -->
    <div class="config-card" id="start-card">
      <h2>Start New Game</h2>
      <button class="config-btn primary" id="btn-start" style="width:100%;">Start New Game</button>
    </div>

    <!-- Streamer action buttons -->
    <div class="config-card" id="action-card">
      <h2>Your Action</h2>
      <div class="vote-buttons" id="streamer-actions">
        <button class="vote-btn" data-action="strike">
          <span class="icon">&#9876;&#65039;</span>
          <div class="info">
            <span class="action-name">Strike</span>
            <span class="action-desc">Basic attack against the boss</span>
          </div>
        </button>
        <button class="vote-btn" data-action="heavy_blow">
          <span class="icon">&#128165;</span>
          <div class="info">
            <span class="action-name">Heavy Blow</span>
            <span class="action-desc">High damage, long cooldown</span>
          </div>
        </button>
        <button class="vote-btn" data-action="shield">
          <span class="icon">&#128737;&#65039;</span>
          <div class="info">
            <span class="action-name">Shield</span>
            <span class="action-desc">Block incoming damage this turn</span>
          </div>
        </button>
        <button class="vote-btn" data-action="potion">
          <span class="icon">&#129514;</span>
          <div class="info">
            <span class="action-name">Potion</span>
            <span class="action-desc">Restore some HP</span>
          </div>
        </button>
      </div>
      <div class="panel-status" id="action-status" style="margin-top:8px;"></div>
    </div>

    <!-- Chat vote preview -->
    <div class="config-card" id="vote-preview-card">
      <h2>Chat Vote Preview</h2>
      <div class="vote-tally" id="lc-vote-tally">
        <div class="tally-row">
          <span class="tally-label">Slash</span>
          <div class="tally-bar-track"><div class="tally-bar-fill" id="lc-tally-slash" style="width:0%"></div></div>
          <span class="tally-count" id="lc-tally-slash-count">0</span>
        </div>
        <div class="tally-row">
          <span class="tally-label">Fireball</span>
          <div class="tally-bar-track"><div class="tally-bar-fill" id="lc-tally-fireball" style="width:0%"></div></div>
          <span class="tally-count" id="lc-tally-fireball-count">0</span>
        </div>
        <div class="tally-row">
          <span class="tally-label">Poison</span>
          <div class="tally-bar-track"><div class="tally-bar-fill" id="lc-tally-poison" style="width:0%"></div></div>
          <span class="tally-count" id="lc-tally-poison-count">0</span>
        </div>
        <div class="tally-row">
          <span class="tally-label">Heal</span>
          <div class="tally-bar-track"><div class="tally-bar-fill" id="lc-tally-heal" style="width:0%"></div></div>
          <span class="tally-count" id="lc-tally-heal-count">0</span>
        </div>
      </div>
    </div>

    <!-- Last turn result -->
    <div class="config-card" id="result-card">
      <h2>Last Turn Result</h2>
      <div id="lc-last-result" class="panel-status">No results yet.</div>
    </div>

    <!-- Force resolve (testing) -->
    <div class="config-card">
      <h2>Testing</h2>
      <button class="config-btn secondary" id="btn-resolve">Force Resolve Turn</button>
    </div>

    <!-- Game over summary -->
    <div class="config-card hidden" id="gameover-card">
      <h2>Game Over</h2>
      <div id="lc-gameover-text" class="turn-number" style="font-size:18px;text-align:center;padding:12px 0;"></div>
    </div>

  </div>

  <!-- Mock Twitch helper when running in test harness -->
  <script>
    if (new URLSearchParams(window.location.search).get('mock') === 'true' && window.parent && window.parent !== window) {
      var cfg = window.parent.BOSS_BATTLE_CONFIG || {};
      window.BOSS_BATTLE_API_BASE = cfg.API_BASE || 'http://localhost:3000';
      window.BOSS_BATTLE_SUPABASE_URL = cfg.SUPABASE_URL || '';
      window.BOSS_BATTLE_SUPABASE_PUBLISHABLE_KEY = cfg.SUPABASE_PUBLISHABLE_KEY || '';
      window.BOSS_BATTLE_CHANNEL_ID = (window.parent.MockTwitch && window.parent.MockTwitch.getChannel()) || 'test-channel-001';
      document.write('<script src="../test-harness/mock-twitch-ext.js"><\/script>');
      // Live config is always the broadcaster view
      document.write('<script>window.MockTwitch.setRole("broadcaster"); window.MockTwitch.reauthorize();<\/script>');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-realtime.js"></script>
  <script src="js/twitch-ext.js"></script>
  <script src="js/live_config.js"></script>
</body>
</html>
