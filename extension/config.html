<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boss Battle — Configuration</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    html, body {
      background: #0a0a0f;
    }
  </style>
</head>
<body>

  <div class="config-container">

    <div class="config-card">
      <h2>Boss Battle Configuration</h2>

      <div class="config-field">
        <label for="boss-name">Boss Name</label>
        <input type="text" id="boss-name" value="Chat Boss" placeholder="Enter boss name">
        <div class="hint">The name displayed for the chat-controlled boss.</div>
      </div>

      <div class="config-field">
        <label for="difficulty">Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
        <div class="hint">Affects boss and streamer base stats (coming soon).</div>
      </div>

      <button class="config-btn primary" id="save-btn">Save Configuration</button>
      <div id="save-status" class="panel-status" style="margin-top:10px;"></div>
    </div>

  </div>

  <!-- Mock Twitch helper when running in test harness -->
  <script>
    if (new URLSearchParams(window.location.search).get('mock') === 'true' && window.parent && window.parent !== window) {
      document.write('<script src="../test-harness/mock-twitch-ext.js"><\/script>');
    }
  </script>
  <script src="js/twitch-ext.js"></script>
  <script src="js/config.js"></script>
</body>
</html>
